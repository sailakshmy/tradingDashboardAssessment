services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "4000:4000"
    environment:
      PORT: 4000
      CORS_ORIGIN: http://localhost:4173
      TICK_INTERVAL_MS: 1000

  client:
    build:
      context: .
      dockerfile: apps/client/Dockerfile
    ports:
      - "4173:4173"
    environment:
      VITE_API_BASE_URL: http://localhost:4000/api
      VITE_WS_BASE_URL: ws://localhost:4000/ws
    depends_on:
      - server
